apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: servers-ca-issuer
spec:
  ca:
    secretName: servers-ca-secret
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: servers-ca
  namespace: cert-manager
spec:
  commonName: ServerS CA
  duration: 87600h
  isCA: true
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: selfsigned-issuer
  privateKey:
    algorithm: RSA
    size: 4096
  renewBefore: 720h
  secretName: servers-ca-secret
