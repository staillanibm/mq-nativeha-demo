apiVersion: mq.ibm.com/v1beta1
kind: QueueManager
metadata:
  name: mq-nativeha
  namespace: ibm-mq
spec:
  imagePullSecrets:
    - name: ibm-entitlement-key
  license:
    accept: true
    license: L-QWBN-T3PKLE
    use: NonProduction
  queueManager:
    image: cp.icr.io/cp/ibm-mqadvanced-server@sha256:7b69ef7c554ced9825b450209c304669626082282b9f5eb021b051acea49a1a0
    # Underlying MQ queue manager name, kept distinct from metadata.name
    # because it doesn't have to follow Kubernetes naming rules (e.g. it can
    # use uppercase letters, which metadata.name cannot).
    name: MQNATIVEHA
    availability:
      type: NativeHA
      tls:
        secretName: mq-nativeha-server-tls
    mqsc:
      - configMap:
          name: mq-nativeha-mqsc
          items:
            - app-definitions.mqsc
    ini:
      - configMap:
          name: mq-nativeha-ini
          items:
            - qm.ini
  pki:
    keys:
      - name: default
        secret:
          secretName: mq-nativeha-server-tls
          items:
            - tls.key
            - tls.crt
            - ca.crt
    trust:
      - name: clientsca
        secret:
          secretName: clients-ca-trust-tls
          items:
            - ca.crt
  version: 9.4.5.1-r1
  # MQ Console / REST API. License type "MQ" (not Cloud Pak for Integration)
  # defaults console/authentication providers to "integration-keycloak", which
  # has nothing to authenticate against here — must be set to "manual" and
  # paired with the basicRegistry in 16-mqweb-configmap.yaml, otherwise every
  # login fails with "No UserRegistry implementation service is available".
  web:
    enabled: true
    console:
      authentication:
        provider: manual
      authorization:
        provider: manual
    manualConfig:
      configMap:
        name: mq-nativeha-mqwebuser
    route:
      enabled: true
