apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: mq-test
  namespace: mq-test
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: mq-test
  namespace: mq-test
spec:
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: mq-test:latest
